# LearnFlow 反向代理示例（心风域名 learn.heartwind.fun）
# 用法：见 deploy/DEPLOY-NGINX-SSL.md
# 首次：只保留下面 HTTP 的 server，执行 certbot 后再取消注释「HTTPS」整块，并把 HTTP 的 location / 改为 return 301。

# HTTP：Let's Encrypt 验证 + 证书申请后改为跳转 HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name learn.heartwind.fun;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # 证书申请成功后改为：return 301 https://$server_name$request_uri;
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

